<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TrustLink Database Schema</title>
<style>
  body { font-family: sans-serif; background: #f8f6f0; margin: 0; padding: 16px; }
  h1 { font-size: 18px; font-weight: 500; color: #1a1a18; margin-bottom: 4px; }
  p  { font-size: 13px; color: #6b6a64; margin-bottom: 16px; }
  #erd { background: white; border-radius: 12px; padding: 16px; border: 1px solid #e2e0d8; overflow-x: auto; }
</style>
</head>
<body>
<h1>TrustLink — Database Schema (ERD)</h1>
<p>Full entity relationship diagram for the TrustLink platform. All amounts stored in XAF.</p>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: 'sans-serif',
  themeVariables: {
    fontSize: '13px',
    lineColor: '#73726c',
    textColor: '#3d3d3a',
    primaryColor: '#f8f6f0',
    primaryBorderColor: '#c8c6be',
  },
});
const diagram = `erDiagram
  USERS {
    serial id PK
    varchar full_name
    varchar email UK
    varchar password_hash
    varchar role
    varchar phone
    varchar quarter
    varchar division
    varchar avatar_initials
    timestamp created_at
  }
  ARTISAN_PROFILES {
    serial id PK
    int user_id FK
    text bio
    varchar availability_status
    int trust_score
    decimal avg_rating
    int total_jobs
    int response_rate
    timestamp updated_at
  }
  SERVICE_CATEGORIES {
    serial id PK
    varchar name UK
    varchar icon
  }
  ARTISAN_SERVICES {
    serial id PK
    int artisan_id FK
    int category_id FK
    varchar title
    text description
    int rate_per_hour
  }
  VERIFICATION_DOCUMENTS {
    serial id PK
    int artisan_id FK
    varchar doc_name
    varchar file_url
    varchar status
    text rejection_reason
    date expiry_date
    timestamp uploaded_at
  }
  JOB_POSTS {
    serial id PK
    int customer_id FK
    int category_id FK
    varchar title
    text description
    varchar quarter
    varchar division
    int budget_min
    int budget_max
    varchar status
    timestamp created_at
  }
  QUOTES {
    serial id PK
    int job_id FK
    int artisan_id FK
    int price
    text message
    int estimated_hours
    varchar status
    timestamp created_at
  }
  BOOKINGS {
    serial id PK
    int job_id FK
    int quote_id FK
    int customer_id FK
    int artisan_id FK
    varchar status
    date scheduled_date
    time scheduled_time
    text location
    int total_amount
    timestamp created_at
  }
  PAYMENTS {
    serial id PK
    int booking_id FK
    int amount
    varchar currency
    varchar method
    varchar status
    varchar momo_transaction_id
    timestamp created_at
  }
  REVIEWS {
    serial id PK
    int booking_id FK
    int customer_id FK
    int artisan_id FK
    int stars
    text comment
    timestamp created_at
  }
  NOTIFICATIONS {
    serial id PK
    int user_id FK
    varchar type
    text message
    boolean is_read
    timestamp created_at
  }
  ADMIN_LOGS {
    serial id PK
    int admin_id FK
    varchar action
    varchar target_type
    int target_id
    timestamp created_at
  }
  USERS ||--o| ARTISAN_PROFILES : "has"
  USERS ||--o{ JOB_POSTS : "posts"
  USERS ||--o{ NOTIFICATIONS : "receives"
  ARTISAN_PROFILES ||--o{ ARTISAN_SERVICES : "offers"
  ARTISAN_PROFILES ||--o{ VERIFICATION_DOCUMENTS : "uploads"
  ARTISAN_PROFILES ||--o{ QUOTES : "submits"
  SERVICE_CATEGORIES ||--o{ ARTISAN_SERVICES : "categorises"
  SERVICE_CATEGORIES ||--o{ JOB_POSTS : "categorises"
  JOB_POSTS ||--o{ QUOTES : "receives"
  JOB_POSTS ||--o| BOOKINGS : "becomes"
  QUOTES ||--o| BOOKINGS : "triggers"
  BOOKINGS ||--o| PAYMENTS : "has"
  BOOKINGS ||--o| REVIEWS : "generates"
  USERS ||--o{ ADMIN_LOGS : "performs"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0],nums[2],nums[4],nums[6]];
  const ys = [nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x);rect.setAttribute('y',y);
  rect.setAttribute('width',w);rect.setAttribute('height',h);rect.setAttribute('rx','8');
  for(const a of['fill','stroke','stroke-width','class','style']){
    if(firstPath.hasAttribute(a))rect.setAttribute(a,firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
</script>
</body>
</html>
